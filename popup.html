<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reddit Profile Analyzer by Platica Group</title>
  <style>
    body {
      width: 340px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 15px;
      background-color: #1a1a1b;
      color: #d7dadc;
      margin: 0;
    }
    h2 {
      margin-top: 0;
      color: #ffffff;
      font-size: 18px;
      text-align: center;
    }
    .main-btn {
      width: 100%;
      padding: 10px;
      background-color: #ffffff;
      color: #1a1a1b;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .main-btn:hover {
      background-color: #e0e0e0;
    }
    #status {
      margin-top: 15px;
      font-size: 12px;
      color: #818384;
      text-align: center;
    }
    .action-btns {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    .action-btns button {
      flex: 1;
      padding: 8px;
      background-color: #343536;
      color: #ffffff;
      border: 1px solid #d7dadc;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      font-weight: bold;
    }
    .action-btns button:hover {
      background-color: #4a4b4c;
    }
    #results {
      margin-top: 10px;
      max-height: 350px;
      overflow-y: auto;
      padding-right: 5px;
    }
    .stats-card {
      background: #272729;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      border: 1px solid #343536;
    }
    .stats-card h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #fff;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      font-size: 12px;
    }
    .post-card {
      background: #272729;
      border: 1px solid #343536;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 10px;
      transition: transform 0.2s, border-color 0.2s;
    }
    .post-card:hover {
      border-color: #d7dadc;
      transform: translateY(-1px);
    }
    .post-title {
      font-size: 13px;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .post-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 11px;
      color: #818384;
    }
    .post-meta span {
      background: #1a1a1b;
      padding: 2px 6px;
      border-radius: 3px;
    }
    .post-subreddit {
      color: #ff4500 !important;
      font-weight: bold;
    }
    #outputContainer {
      display: none;
    }
  </style>
</head>
<body>
  <h2>Reddit Profile Analyzer<br><span style="font-size: 14px; color: #818384;">by Platica Group</span></h2>
  <p style="font-size: 12px; text-align: center; color: #818384; margin-bottom: 15px;">
    Abre un perfil de Reddit (ej. /user/username) y haz clic en Analizar.
  </p>
  
  <select id="periodFilter" style="width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 10px; background: #272729; color: #fff; border: 1px solid #d7dadc; border-radius: 4px;">
    <option value="all">Todo el historial visible</option>
    <option value="24h">Últimas 24 Horas (Solo min y hr)</option>
    <option value="48h">Últimas 48 Horas (Hasta 1 day ago)</option>
    <option value="72h">Últimas 72 Horas (Hasta 2 days ago)</option>
    <option value="custom">Personalizado (Días)</option>
  </select>

  <input type="text" id="subredditFilter" placeholder="Filtrar por subreddit (ej. r/gaming o gaming)" style="width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 10px; background: #272729; color: #fff; border: 1px solid #d7dadc; border-radius: 4px;">

  <div id="customDaysContainer" style="display: none; margin-bottom: 15px; text-align: right;">
    <label style="font-size: 12px; color: #818384;">Días máximos:</label>
    <input type="number" id="customDays" value="10" min="1" style="width: 60px; padding: 4px; background: #272729; color: #fff; border: 1px solid #d7dadc; border-radius: 4px; margin-left: 10px;">
  </div>

  <button id="analyzeBtn" class="main-btn">Analizar Posts Visibles</button>
  <div id="status">Esperando acción...</div>
  
  <div id="outputContainer">
    <div class="action-btns">
      <button id="copyBtn">📋 Copiar</button>
      <button id="downloadBtn">⬇️ Descargar MD</button>
    </div>
    <div id="results"></div>
  </div>

  <div style="text-align: center; font-size: 11px; color: #818384; margin-top: 20px;">
    Hecho por <strong>Platica Group</strong>
  </div>

  <script src="popup.js"></script>
</body>
</html>
